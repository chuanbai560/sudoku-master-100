<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sudoku Master</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#0e1a22;
color:#00f2ff;
text-align:center;
margin:0;
transition:0.3s;
}

body.eye{
background:#f4f1e8;
color:#333;
}

h1{margin-top:20px}

table{
margin:20px auto;
border-collapse:collapse;
border:3px solid #00f2ff;
}

body.eye table{
border:3px solid #666;
}

td{
width:45px;
height:45px;
border:1px dashed rgba(0,242,255,0.4);
}

body.eye td{
border:1px dashed #aaa;
}

tr:nth-child(3n) td{border-bottom:3px solid #00f2ff;}
td:nth-child(3n){border-right:3px solid #00f2ff;}

input{
width:100%;
height:100%;
text-align:center;
font-size:20px;
border:none;
background:transparent;
color:#00f2ff;
}

body.eye input{color:#333;}

.fixed input{font-weight:bold;}

button{
padding:8px 15px;
margin:5px;
background:#0b1117;
color:#00f2ff;
border:1px solid #00f2ff;
cursor:pointer;
}

body.eye button{
background:#ddd;
color:#333;
border:1px solid #333;
}

@media (max-width:600px){
td{width:36px;height:36px;}
input{font-size:18px;}
}

</style>

</head>

<body>

<h1>Sudoku Master</h1>

<div>

Mode: <span id="mode"></span> |
Round: <span id="round"></span>/100 |
Score: <span id="score"></span> |
Mistakes: <span id="mistakes"></span>/3 |
Hints: <span id="hints"></span>/2 |
Time: <span id="timer">0:00</span>

</div>

<div>

<button onclick="newGame()">Classic Mode</button> <button onclick="dailyGame()">Daily Challenge</button> <button onclick="useHint()">Hint</button> <button onclick="undo()">Undo</button> <button onclick="redo()">Redo</button> <button onclick="toggleMode()">Theme</button>

</div>

<table id="board"></table>

<div style="margin:20px">
Ad Space
</div>

<h3>Leaderboard</h3>
<div id="leaderboard"></div>

<script>

let solution=[]
let puzzle=[]

let mode="classic"

let round=localStorage.getItem("round")*1||1
let score=localStorage.getItem("score")*1||0

let mistakes=0
let hints=2

let timer=0
let timerInterval=null

let history=[]
let redoStack=[]

let leaderboard=JSON.parse(localStorage.getItem("leaderboard")||"[]")

function updateInfo(){

document.getElementById("mode").innerText=mode
document.getElementById("round").innerText=round
document.getElementById("score").innerText=score
document.getElementById("mistakes").innerText=mistakes
document.getElementById("hints").innerText=hints

localStorage.setItem("round",round)
localStorage.setItem("score",score)

renderLeaderboard()

}

function startTimer(){

clearInterval(timerInterval)

timer=0

timerInterval=setInterval(()=>{

timer++

let m=Math.floor(timer/60)
let s=timer%60
if(s<10)s="0"+s

document.getElementById("timer").innerText=m+":"+s

},1000)

}

function generateSudoku(){

let g=Array.from({length:9},()=>Array(9).fill(0))

function valid(r,c,n){

for(let i=0;i<9;i++)
if(g[r][i]==n||g[i][c]==n) return false

let br=Math.floor(r/3)*3
let bc=Math.floor(c/3)*3

for(let i=0;i<3;i++)
for(let j=0;j<3;j++)
if(g[br+i][bc+j]==n) return false

return true

}

function fill(pos=0){

if(pos==81) return true

let r=Math.floor(pos/9)
let c=pos%9

let nums=[1,2,3,4,5,6,7,8,9].sort(()=>Math.random()-0.5)

for(let n of nums){

if(valid(r,c,n)){

g[r][c]=n

if(fill(pos+1)) return true

g[r][c]=0

}

}

return false

}

fill()
return g

}

function seededRandom(seed){

let x=Math.sin(seed)*10000
return x-Math.floor(x)

}

function makePuzzle(grid,seed=null){

let givens

if(mode=="classic"){

givens = 22 + Math.floor((100 - round) / 5)

if(givens > 41) givens = 41

}else{

givens = 30

}

let holes=81-givens

let p=grid.map(r=>r.slice())

while(holes>0){

let r,c

if(seed!=null){

seed++
r=Math.floor(seededRandom(seed)*9)

seed++
c=Math.floor(seededRandom(seed)*9)

}else{

r=Math.floor(Math.random()*9)
c=Math.floor(Math.random()*9)

}

if(p[r][c]!=0){

p[r][c]=0
holes--

}

}

return p

}

function drawBoard(){

let board=document.getElementById("board")
board.innerHTML=""

for(let r=0;r<9;r++){

let tr=document.createElement("tr")

for(let c=0;c<9;c++){

let td=document.createElement("td")
let input=document.createElement("input")

if(puzzle[r][c]!=0){

input.value=puzzle[r][c]
input.disabled=true
td.classList.add("fixed")

}else{

input.addEventListener("input",()=>handleInput(r,c,input))

}

td.appendChild(input)
tr.appendChild(td)

}

board.appendChild(tr)

}

}

function saveState(){

history.push(JSON.stringify(puzzle))
redoStack=[]

}

function undo(){

if(history.length==0) return

redoStack.push(JSON.stringify(puzzle))
puzzle=JSON.parse(history.pop())

drawBoard()

}

function redo(){

if(redoStack.length==0) return

history.push(JSON.stringify(puzzle))
puzzle=JSON.parse(redoStack.pop())

drawBoard()

}

function handleInput(r,c,input){

let v=input.value

if(v==="") return

if(!/^[1-9]$/.test(v)){

alert("Only 1-9 allowed")
input.value=""
return

}

saveState()

if(Number(v)!==solution[r][c]){

mistakes++

updateInfo()

alert("Wrong! Remaining "+(3-mistakes))

input.value=""

if(mistakes>=3){

alert("Game Over")
newGame()

}

return

}

puzzle[r][c]=Number(v)

checkComplete()

}

function useHint(){

if(hints<=0){

alert("No hints left")
return

}

let empty=[]

for(let r=0;r<9;r++)
for(let c=0;c<9;c++)
if(puzzle[r][c]==0) empty.push({r,c})

if(empty.length==0) return

let pick=empty[Math.floor(Math.random()*empty.length)]

puzzle[pick.r][pick.c]=solution[pick.r][pick.c]

hints--

drawBoard()
updateInfo()

}

function checkComplete(){

for(let r=0;r<9;r++)
for(let c=0;c<9;c++)
if(puzzle[r][c]!=solution[r][c]) return

if(mode=="daily"){

let today=new Date().toDateString()
localStorage.setItem("daily_"+today,"done")

alert("Daily Challenge Completed!")

}else{

score+=100
round++

}

updateLeaderboard()

newGame()

}

function updateLeaderboard(){

leaderboard.push({score,round,time:timer})

leaderboard.sort((a,b)=>b.score-a.score)

leaderboard=leaderboard.slice(0,10)

localStorage.setItem("leaderboard",JSON.stringify(leaderboard))

}

function renderLeaderboard(){

let html=""

leaderboard.forEach((p,i)=>{

html+=(i+1)+". Score:"+p.score+" Round:"+p.round+" Time:"+p.time+"s<br>"

})

document.getElementById("leaderboard").innerHTML=html

}

function toggleMode(){
document.body.classList.toggle("eye")
}

function newGame(){

mode="classic"

solution=generateSudoku()
puzzle=makePuzzle(solution)

mistakes=0
hints=2

drawBoard()
startTimer()
updateInfo()

}

function dailyGame(){

mode="daily"

let today=new Date()

let seed=today.getFullYear()*10000+(today.getMonth()+1)*100+today.getDate()

solution=generateSudoku()
puzzle=makePuzzle(solution,seed)

mistakes=0
hints=2

drawBoard()
startTimer()
updateInfo()

}

newGame()

</script>

</body>
</html>
