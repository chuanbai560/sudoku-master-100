<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sudoku Master Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#0e1a22;
color:#00f2ff;
text-align:center;
margin:0;
transition:0.3s;
}

body.eye{
background:#f4f1e8;
color:#333;
}

h1{margin-top:20px}

table{
margin:20px auto;
border-collapse:collapse;
border:3px solid #00f2ff;
}

body.eye table{
border:3px solid #666;
}

td{
width:45px;
height:45px;
border:1px dashed rgba(0,242,255,0.4);
}

body.eye td{
border:1px dashed #aaa;
}

tr:nth-child(3n) td{border-bottom:3px solid #00f2ff;}
td:nth-child(3n){border-right:3px solid #00f2ff;}

input{
width:100%;
height:100%;
text-align:center;
font-size:20px;
border:none;
background:transparent;
color:#00f2ff;
}

body.eye input{color:#333;}

.fixed input{
font-weight:bold;
color:white;
}

button{
padding:8px 15px;
margin:5px;
background:#0b1117;
color:#00f2ff;
border:1px solid #00f2ff;
cursor:pointer;
}

body.eye button{
background:#ddd;
color:#333;
border:1px solid #333;
}

@media (max-width:600px){
td{width:36px;height:36px;}
input{font-size:18px;}
}

</style>

</head>

<body>

<h1>Sudoku Master Pro</h1>

<div>

Mode: <span id="mode"></span> |
Round: <span id="round"></span>/100 |
Difficulty: <span id="difficulty"></span> |
Score: <span id="score"></span> |
Mistakes: <span id="mistakes"></span>/3 |
Hints: <span id="hints"></span>/2 |
Time: <span id="timer">0:00</span>

</div>

<div>

<button onclick="newGame()">Classic</button> <button onclick="dailyGame()">Daily</button> <button onclick="useHint()">Hint</button> <button onclick="toggleMode()">Theme</button>

</div>

<table id="board"></table>

<h3>Leaderboard</h3>
<div id="leaderboard"></div>

<h3>Daily Leaderboard</h3>
<div id="dailyBoard"></div>

<script>

let solution=[]
let puzzle=[]

let mode="classic"

let round=localStorage.getItem("round")*1||1
let score=localStorage.getItem("score")*1||0

let mistakes=0
let hints=2

let difficulty=""

let timer=0
let timerInterval=null

let leaderboard=JSON.parse(localStorage.getItem("leaderboard")||"[]")
let dailyBoard=JSON.parse(localStorage.getItem("dailyBoard")||"[]")

function updateInfo(){

document.getElementById("mode").innerText=mode
document.getElementById("round").innerText=round
document.getElementById("score").innerText=score
document.getElementById("mistakes").innerText=mistakes
document.getElementById("hints").innerText=hints
document.getElementById("difficulty").innerText=difficulty

renderLeaderboard()
renderDaily()

localStorage.setItem("round",round)
localStorage.setItem("score",score)

}

function startTimer(){

clearInterval(timerInterval)

timer=0

timerInterval=setInterval(()=>{

timer++

let m=Math.floor(timer/60)
let s=timer%60
if(s<10)s="0"+s

document.getElementById("timer").innerText=m+":"+s

},1000)

}

function generateSudoku(){

let g=Array.from({length:9},()=>Array(9).fill(0))

function valid(r,c,n){

for(let i=0;i<9;i++)
if(g[r][i]==n||g[i][c]==n) return false

let br=Math.floor(r/3)*3
let bc=Math.floor(c/3)*3

for(let i=0;i<3;i++)
for(let j=0;j<3;j++)
if(g[br+i][bc+j]==n) return false

return true

}

function fill(pos=0){

if(pos==81) return true

let r=Math.floor(pos/9)
let c=pos%9

let nums=[1,2,3,4,5,6,7,8,9].sort(()=>Math.random()-0.5)

for(let n of nums){

if(valid(r,c,n)){

g[r][c]=n

if(fill(pos+1)) return true

g[r][c]=0

}

}

return false

}

fill()

return g

}

function countSolutions(grid){

let count=0

function solve(){

for(let r=0;r<9;r++)
for(let c=0;c<9;c++){

if(grid[r][c]==0){

for(let n=1;n<=9;n++){

if(validNumber(grid,r,c,n)){

grid[r][c]=n
solve()
grid[r][c]=0

}

}

return

}

}

count++

}

solve()

return count

}

function validNumber(g,r,c,n){

for(let i=0;i<9;i++)
if(g[r][i]==n||g[i][c]==n) return false

let br=Math.floor(r/3)*3
let bc=Math.floor(c/3)*3

for(let i=0;i<3;i++)
for(let j=0;j<3;j++)
if(g[br+i][bc+j]==n) return false

return true

}

function rateDifficulty(p){

let givens=0

for(let r=0;r<9;r++)
for(let c=0;c<9;c++)
if(p[r][c]!=0) givens++

if(givens>36) return "Easy"
if(givens>30) return "Medium"
if(givens>25) return "Hard"

return "Expert"

}

function makePuzzle(grid){

let givens

if(mode=="classic"){

givens = 22 + Math.floor((100-round)/5)

if(givens>41) givens=41

}else{

givens=30

}

let holes=81-givens

let p=grid.map(r=>r.slice())

while(holes>0){

let r=Math.floor(Math.random()*9)
let c=Math.floor(Math.random()*9)

if(p[r][c]!=0){

let backup=p[r][c]

p[r][c]=0

let copy=p.map(r=>r.slice())

if(countSolutions(copy)!=1){

p[r][c]=backup

}else{

holes--

}

}

}

difficulty=rateDifficulty(p)

return p

}

function drawBoard(){

let board=document.getElementById("board")
board.innerHTML=""

for(let r=0;r<9;r++){

let tr=document.createElement("tr")

for(let c=0;c<9;c++){

let td=document.createElement("td")
let input=document.createElement("input")

if(puzzle[r][c]!=0){

input.value=puzzle[r][c]
input.disabled=true
td.classList.add("fixed")

}else{

input.addEventListener("input",()=>handleInput(r,c,input))

}

td.appendChild(input)
tr.appendChild(td)

}

board.appendChild(tr)

}

}

function handleInput(r,c,input){

let v=input.value

if(!/^[1-9]$/.test(v)){

alert("Only numbers 1-9 allowed")
input.value=""
return

}

if(Number(v)!==solution[r][c]){

mistakes++

alert("Wrong! Remaining "+(3-mistakes))

input.value=""

if(mistakes>=3){

alert("Game Over")
newGame()

}

updateInfo()
return

}

puzzle[r][c]=Number(v)

checkComplete()

}

function useHint(){

if(hints<=0){

alert("No hints left")
return

}

let empty=[]

for(let r=0;r<9;r++)
for(let c=0;c<9;c++)
if(puzzle[r][c]==0) empty.push({r,c})

let pick=empty[Math.floor(Math.random()*empty.length)]

puzzle[pick.r][pick.c]=solution[pick.r][pick.c]

hints--

drawBoard()
updateInfo()

}

function checkComplete(){

for(let r=0;r<9;r++)
for(let c=0;c<9;c++)
if(puzzle[r][c]!=solution[r][c]) return

if(mode=="daily"){

let name=prompt("Daily Completed! Enter name")

dailyBoard.push({name,time:timer})

dailyBoard.sort((a,b)=>a.time-b.time)

dailyBoard=dailyBoard.slice(0,10)

localStorage.setItem("dailyBoard",JSON.stringify(dailyBoard))

}else{

score+=100
round++

}

updateLeaderboard()

alert("Completed!")

newGame()

}

function updateLeaderboard(){

leaderboard.push({score,round,time:timer})

leaderboard.sort((a,b)=>b.score-a.score)

leaderboard=leaderboard.slice(0,10)

localStorage.setItem("leaderboard",JSON.stringify(leaderboard))

}

function renderLeaderboard(){

let html=""

leaderboard.forEach((p,i)=>{

html+=(i+1)+". Score:"+p.score+" Round:"+p.round+" Time:"+p.time+"s<br>"

})

document.getElementById("leaderboard").innerHTML=html

}

function renderDaily(){

let html=""

dailyBoard.forEach((p,i)=>{

html+=(i+1)+". "+p.name+" - "+p.time+"s<br>"

})

document.getElementById("dailyBoard").innerHTML=html

}

function toggleMode(){
document.body.classList.toggle("eye")
}

function newGame(){

mode="classic"

solution=generateSudoku()
puzzle=makePuzzle(solution)

mistakes=0
hints=2

drawBoard()
startTimer()
updateInfo()

}

function dailyGame(){

mode="daily"

solution=generateSudoku()
puzzle=makePuzzle(solution)

mistakes=0
hints=2

drawBoard()
startTimer()
updateInfo()

}

newGame()

</script>

</body>
</html>
